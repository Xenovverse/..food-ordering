<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxe — Cashier Dashboard</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #09090b;
        color: #fff;
        min-height: 100vh;
      }

      /* Grain */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 200px;
        opacity: 0.35;
      }

      /* Glass */
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.07);
      }

      /* Navbar */
      #navbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(9, 9, 11, 0.9);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      /* Stat card */
      .stat-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 20px;
        padding: 20px;
        transition: border-color 0.2s;
      }
      .stat-card:hover {
        border-color: rgba(255, 255, 255, 0.12);
      }

      /* Tab */
      .tab-btn {
        padding: 8px 20px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.4);
        transition: all 0.2s;
        cursor: pointer;
        border: 1px solid transparent;
      }
      .tab-btn.active {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        border-color: rgba(16, 185, 129, 0.3);
      }
      .tab-btn:not(.active):hover {
        color: rgba(255, 255, 255, 0.7);
        background: rgba(255, 255, 255, 0.04);
      }

      /* Order card */
      .order-card {
        background: rgba(255, 255, 255, 0.025);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 20px;
        overflow: hidden;
        animation: slideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-16px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .order-card.completed {
        border-color: rgba(255, 255, 255, 0.04);
        background: rgba(255, 255, 255, 0.015);
      }

      /* Status badges */
      .badge-pending {
        background: rgba(251, 191, 36, 0.12);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.25);
        animation: pulseBadge 2s ease-in-out infinite;
      }
      @keyframes pulseBadge {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4);
        }
        50% {
          box-shadow: 0 0 0 4px rgba(251, 191, 36, 0);
        }
      }
      .badge-completed {
        background: rgba(16, 185, 129, 0.12);
        color: #10b981;
        border: 1px solid rgba(16, 185, 129, 0.25);
      }

      /* Payment badges */
      .badge-cash {
        background: rgba(99, 102, 241, 0.12);
        color: #818cf8;
        border: 1px solid rgba(99, 102, 241, 0.25);
      }
      .badge-qris {
        background: rgba(249, 115, 22, 0.12);
        color: #fb923c;
        border: 1px solid rgba(249, 115, 22, 0.25);
      }

      /* Complete button */
      .complete-btn {
        background: rgba(16, 185, 129, 0.08);
        color: #10b981;
        border: 1px solid rgba(16, 185, 129, 0.2);
        transition: all 0.2s;
      }
      .complete-btn:hover {
        background: #10b981;
        color: #fff;
        box-shadow: 0 0 24px rgba(16, 185, 129, 0.35);
      }
      .complete-btn:active {
        transform: scale(0.97);
      }

      /* Toast */
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 200;
        min-width: 280px;
        max-width: 340px;
        background: #111113;
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 18px;
        padding: 16px 18px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.7),
          0 0 0 1px rgba(16, 185, 129, 0.15);
        transform: translateX(calc(100% + 32px));
        transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
        pointer-events: all;
      }
      .toast.show {
        transform: translateX(0);
      }
      .toast.hide {
        transform: translateX(calc(100% + 32px));
        transition-timing-function: cubic-bezier(0.4, 0, 1, 1);
      }

      /* Empty state */
      .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: rgba(255, 255, 255, 0.2);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
      }

      /* Ambient orb */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
        z-index: 0;
      }

      /* Connection dot */
      .live-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #10b981;
        animation: livePulse 2s ease-in-out infinite;
      }
      @keyframes livePulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6);
        }
        50% {
          box-shadow: 0 0 0 5px rgba(16, 185, 129, 0);
        }
      }
    </style>
  </head>
  <body>
    <!-- Ambient -->
    <div class="orb w-96 h-96 bg-emerald-700/[0.06] top-0 left-0"></div>
    <div class="orb w-80 h-80 bg-emerald-600/[0.05] bottom-0 right-0"></div>

    <!-- ─────────────── AUTH GATE ─────────────── -->
    <div
      id="auth-gate"
      class="hidden fixed inset-0 z-[300] bg-[#09090b] flex items-center justify-center"
    >
      <div class="text-center">
        <div class="text-4xl mb-4">🔐</div>
        <p class="text-zinc-400 text-sm">Redirecting to login…</p>
      </div>
    </div>

    <!-- ─────────────── NAVBAR ─────────────── -->
    <nav id="navbar" class="px-4 md:px-8">
      <div class="max-w-6xl mx-auto flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <div
            class="w-8 h-8 rounded-xl bg-emerald-500/10 ring-1 ring-emerald-500/30 flex items-center justify-center"
          >
            <span class="text-emerald-400 text-sm">◆</span>
          </div>
          <div>
            <span class="font-bold text-white text-sm">LUXE</span>
            <span class="text-zinc-600 text-sm"> · Cashier</span>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <!-- Live indicator -->
          <div
            class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/8 ring-1 ring-emerald-500/20"
          >
            <div class="live-dot"></div>
            <span class="text-xs text-emerald-400 font-semibold">Live</span>
          </div>

          <!-- Logout -->
          <button
            onclick="doLogout()"
            class="flex items-center gap-2 px-3 py-1.5 rounded-xl text-xs text-zinc-400 hover:text-white hover:bg-white/5 border border-white/7 transition-all"
          >
            <svg
              class="w-3.5 h-3.5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- ─────────────── MAIN ─────────────── -->
    <main class="max-w-6xl mx-auto px-4 md:px-8 pb-20 relative z-10">
      <!-- Page header -->
      <div class="py-8">
        <h1 class="text-2xl font-extrabold text-white">Order Dashboard</h1>
        <p class="text-zinc-500 text-sm mt-1">
          Real-time order management for kitchen & cashier.
        </p>
      </div>

      <!-- ── STATS ── -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="stat-card">
          <p
            class="text-[11px] text-zinc-500 uppercase tracking-widest font-semibold mb-2"
          >
            Total Orders
          </p>
          <p class="text-3xl font-extrabold text-white" id="stat-total">0</p>
        </div>
        <div class="stat-card">
          <p
            class="text-[11px] text-zinc-500 uppercase tracking-widest font-semibold mb-2"
          >
            Active
          </p>
          <p class="text-3xl font-extrabold text-amber-400" id="stat-active">
            0
          </p>
        </div>
        <div class="stat-card">
          <p
            class="text-[11px] text-zinc-500 uppercase tracking-widest font-semibold mb-2"
          >
            Completed
          </p>
          <p
            class="text-3xl font-extrabold text-emerald-400"
            id="stat-completed"
          >
            0
          </p>
        </div>
        <div class="stat-card">
          <p
            class="text-[11px] text-zinc-500 uppercase tracking-widest font-semibold mb-2"
          >
            Revenue
          </p>
          <p
            class="text-2xl font-extrabold text-white leading-tight"
            id="stat-revenue"
          >
            Rp 0
          </p>
        </div>
      </div>

      <!-- ── TABS ── -->
      <div class="flex items-center gap-2 mb-6">
        <button
          class="tab-btn active"
          id="tab-active"
          onclick="switchTab('active')"
        >
          Active Orders
          <span
            id="active-count-badge"
            class="ml-2 inline-flex items-center justify-center w-5 h-5 rounded-full bg-amber-500/20 text-amber-400 text-[10px] font-bold"
            >0</span
          >
        </button>
        <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
          History
          <span
            id="history-count-badge"
            class="ml-2 inline-flex items-center justify-center w-5 h-5 rounded-full bg-white/10 text-zinc-400 text-[10px] font-bold"
            >0</span
          >
        </button>
      </div>

      <!-- ── ORDER GRIDS ── -->
      <div id="panel-active">
        <div
          id="grid-active"
          class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"
        >
          <!-- Orders rendered here -->
        </div>
        <div id="empty-active" class="hidden empty-state">
          <div class="text-5xl mb-4 opacity-30">📋</div>
          <p class="text-sm font-medium">No active orders</p>
          <p class="text-xs mt-1 opacity-60">
            New orders will appear here in real-time
          </p>
        </div>
      </div>

      <div id="panel-history" class="hidden">
        <div
          id="grid-history"
          class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"
        >
          <!-- Completed orders -->
        </div>
        <div id="empty-history" class="hidden empty-state">
          <div class="text-5xl mb-4 opacity-30">🕐</div>
          <p class="text-sm font-medium">No completed orders yet</p>
        </div>
      </div>
    </main>

    <!-- ─────────────── TOAST CONTAINER ─────────────── -->
    <div id="toast-container" aria-live="polite"></div>

    <!-- ─────────────── Scripts ─────────────── -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
      // ═══════════════════════════════════════════════════
      //  STATE
      // ═══════════════════════════════════════════════════
      let orders = [];
      let currentTab = "active";
      let toastQueue = [];

      // ═══════════════════════════════════════════════════
      //  AUTH CHECK
      // ═══════════════════════════════════════════════════
      (async () => {
        try {
          const res = await fetch("/api/check-auth");
          const data = await res.json();
          if (!data.authenticated) redirectToLogin();
        } catch {
          redirectToLogin();
        }
      })();

      function redirectToLogin() {
        document.getElementById("auth-gate").classList.remove("hidden");
        setTimeout(() => {
          window.location.href = "/login.html";
        }, 800);
      }

      async function doLogout() {
        await fetch("/api/logout", { method: "POST" });
        window.location.href = "/login.html";
      }

      // ═══════════════════════════════════════════════════
      //  UTILS
      // ═══════════════════════════════════════════════════
      const fmt = (n) => "Rp " + new Intl.NumberFormat("id-ID").format(n);

      const fmtTime = (iso) => {
        const d = new Date(iso);
        return d.toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      };

      // ═══════════════════════════════════════════════════
      //  AUDIO – Haptic-style chime
      // ═══════════════════════════════════════════════════
      function playChime() {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          const ctx = new AC();

          const tone = (freq, start, dur, vol = 0.25) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = "sine";
            osc.frequency.setValueAtTime(freq, start);
            gain.gain.setValueAtTime(0, start);
            gain.gain.linearRampToValueAtTime(vol, start + 0.012);
            gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
            osc.start(start);
            osc.stop(start + dur);
          };

          const t = ctx.currentTime;
          tone(523.25, t, 0.35); // C5
          tone(783.99, t + 0.12, 0.35); // G5
          tone(1046.5, t + 0.25, 0.55); // C6
        } catch (e) {
          /* audio not available */
        }
      }

      // ═══════════════════════════════════════════════════
      //  TOAST SYSTEM
      // ═══════════════════════════════════════════════════
      function showToast(order) {
        const container = document.getElementById("toast-container");
        const el = document.createElement("div");
        el.className = "toast";

        const payLabel = order.paymentMethod === "qris" ? "QRIS" : "Cash";
        const payColor = order.paymentMethod === "qris" ? "#fb923c" : "#818cf8";
        const itemCount = order.items.reduce((s, i) => s + i.quantity, 0);

        el.innerHTML = `
        <div style="width:10px;height:10px;border-radius:50%;background:#10b981;
                    flex-shrink:0;margin-top:3px;animation:livePulse 2s infinite"></div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
            <p style="font-size:13px;font-weight:700;color:#fff">New Order · ${order.id}</p>
            <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;
                         background:${payColor}18;color:${payColor};border:1px solid ${payColor}30;
                         white-space:nowrap">${payLabel}</span>
          </div>
          <p style="font-size:11px;color:rgba(255,255,255,0.45);margin-top:3px">
            ${itemCount} item${itemCount !== 1 ? "s" : ""} · ${fmt(order.total)}
          </p>
          <p style="font-size:10px;color:rgba(255,255,255,0.25);margin-top:2px">
            ${fmtTime(order.timestamp)}
          </p>
        </div>
        <button onclick="this.closest('.toast').remove()"
          style="color:rgba(255,255,255,0.3);font-size:18px;line-height:1;
                 background:none;border:none;cursor:pointer;flex-shrink:0;
                 padding:0;margin-top:-2px">&times;</button>
      `;

        container.appendChild(el);
        // Offset if multiple toasts
        const existing = container.querySelectorAll(".toast");
        const offset = (existing.length - 1) * 90;
        el.style.top = `${20 + offset}px`;

        requestAnimationFrame(() => {
          requestAnimationFrame(() => el.classList.add("show"));
        });

        setTimeout(() => {
          el.classList.remove("show");
          el.classList.add("hide");
          el.addEventListener("transitionend", () => el.remove(), {
            once: true,
          });
        }, 6000);
      }

      // ═══════════════════════════════════════════════════
      //  STATS
      // ═══════════════════════════════════════════════════
      function updateStats() {
        const active = orders.filter((o) => o.status === "pending");
        const completed = orders.filter((o) => o.status === "completed");
        const revenue = completed.reduce((s, o) => s + o.total, 0);

        document.getElementById("stat-total").textContent = orders.length;
        document.getElementById("stat-active").textContent = active.length;
        document.getElementById("stat-completed").textContent =
          completed.length;
        document.getElementById("stat-revenue").textContent = fmt(revenue);

        document.getElementById("active-count-badge").textContent =
          active.length;
        document.getElementById("history-count-badge").textContent =
          completed.length;
      }

      // ═══════════════════════════════════════════════════
      //  RENDER ORDER CARD
      // ═══════════════════════════════════════════════════
      function renderOrderCard(order) {
        const isPending = order.status === "pending";
        const payLabel = order.paymentMethod === "qris" ? "QRIS" : "Cash";
        const payClass =
          order.paymentMethod === "qris" ? "badge-qris" : "badge-cash";
        const statusLabel = isPending ? "Pending" : "Completed";
        const statusClass = isPending ? "badge-pending" : "badge-completed";
        const itemCount = order.items.reduce((s, i) => s + i.quantity, 0);

        const noteHtml = order.note
          ? `<div style="margin-top:12px;padding:10px 12px;border-radius:10px;
                       background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)">
             <p style="font-size:10px;color:rgba(255,255,255,0.3);font-weight:600;
                       text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Note</p>
             <p style="font-size:12px;color:rgba(255,255,255,0.5)">${escHtml(order.note)}</p>
           </div>`
          : "";

        const actionHtml = isPending
          ? `<button onclick="markComplete('${order.id}')"
             style="width:100%;padding:11px;border-radius:12px;font-size:12px;font-weight:700;
                    cursor:pointer;font-family:inherit"
             class="complete-btn">
             ✓ Mark as Completed
           </button>`
          : `<div style="text-align:center;padding:10px;font-size:11px;color:rgba(255,255,255,0.2)">
             ✓ Order fulfilled
           </div>`;

        const itemsHtml = order.items
          .map(
            (item) => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">
          <span style="font-size:12px;color:rgba(255,255,255,0.55);flex:1;min-width:0;
                       white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${item.quantity}× ${escHtml(item.name)}
          </span>
          <span style="font-size:11px;color:rgba(255,255,255,0.35);flex-shrink:0;margin-left:8px">
            ${fmt(item.price * item.quantity)}
          </span>
        </div>`,
          )
          .join("");

        const card = document.createElement("div");
        card.className = `order-card${!isPending ? " completed" : ""}`;
        card.id = `card-${order.id}`;
        card.style.cssText = "animation-delay: 0s";

        card.innerHTML = `
        <!-- Card inner padding -->
        <div style="padding:20px">
          <!-- Header -->
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
            <div>
              <p style="font-family:monospace;font-size:13px;font-weight:700;color:#fff;letter-spacing:0.02em">
                ${order.id}
              </p>
              <p style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px">
                ${fmtTime(order.timestamp)}
              </p>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
              <span class="${payClass}" style="font-size:10px;font-weight:700;padding:3px 10px;
                             border-radius:7px;letter-spacing:0.04em">${payLabel}</span>
              <span class="${statusClass}" style="font-size:10px;font-weight:700;padding:3px 10px;
                              border-radius:7px;letter-spacing:0.04em">${statusLabel}</span>
            </div>
          </div>

          <!-- Items -->
          <div style="border-top:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05);
                      padding:12px 0;margin-bottom:12px">
            ${itemsHtml}
          </div>

          <!-- Total -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;
                         letter-spacing:0.05em;font-weight:600">${itemCount} item${itemCount !== 1 ? "s" : ""}</span>
            <span style="font-size:16px;font-weight:800;color:#fff">${fmt(order.total)}</span>
          </div>

          ${noteHtml}
        </div>

        <!-- Action -->
        <div style="padding:0 20px 20px">${actionHtml}</div>
      `;

        return card;
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ═══════════════════════════════════════════════════
      //  RENDER GRIDS
      // ═══════════════════════════════════════════════════
      function renderGrids() {
        const activeOrders = orders.filter((o) => o.status === "pending");
        const completedOrders = orders
          .filter((o) => o.status === "completed")
          .slice()
          .reverse();

        // Active grid
        const gridActive = document.getElementById("grid-active");
        const emptyActive = document.getElementById("empty-active");
        gridActive.innerHTML = "";
        if (activeOrders.length === 0) {
          emptyActive.classList.remove("hidden");
        } else {
          emptyActive.classList.add("hidden");
          activeOrders.forEach((o) =>
            gridActive.appendChild(renderOrderCard(o)),
          );
        }

        // History grid
        const gridHistory = document.getElementById("grid-history");
        const emptyHistory = document.getElementById("empty-history");
        gridHistory.innerHTML = "";
        if (completedOrders.length === 0) {
          emptyHistory.classList.remove("hidden");
        } else {
          emptyHistory.classList.add("hidden");
          completedOrders.forEach((o) =>
            gridHistory.appendChild(renderOrderCard(o)),
          );
        }

        updateStats();
      }

      // ═══════════════════════════════════════════════════
      //  TABS
      // ═══════════════════════════════════════════════════
      function switchTab(tab) {
        currentTab = tab;
        document.getElementById("tab-active").className =
          `tab-btn${tab === "active" ? " active" : ""}`;
        document.getElementById("tab-history").className =
          `tab-btn${tab === "history" ? " active" : ""}`;
        document
          .getElementById("panel-active")
          .classList.toggle("hidden", tab !== "active");
        document
          .getElementById("panel-history")
          .classList.toggle("hidden", tab !== "history");
      }

      // ═══════════════════════════════════════════════════
      //  MARK COMPLETE
      // ═══════════════════════════════════════════════════
      function markComplete(orderId) {
        socket.emit("update-status", { orderId, status: "completed" });
      }

      // ═══════════════════════════════════════════════════
      //  SOCKET.IO
      // ═══════════════════════════════════════════════════
      const socket = io({ transports: ["websocket", "polling"] });

      socket.on("connect", () => {
        console.log("[socket] Connected:", socket.id);
        setLiveStatus(true);
      });

      socket.on("new-order", (order) => {
        // Guard against duplicate (e.g. reconnect replay)
        if (orders.find((o) => o.id === order.id)) return;
        orders.unshift(order);
        renderGrids();
        playChime();
        showToast(order);
      });

      socket.on("order-updated", (updatedOrder) => {
        const idx = orders.findIndex((o) => o.id === updatedOrder.id);
        if (idx !== -1) orders[idx] = updatedOrder;
        renderGrids();
      });

      socket.on("disconnect", () => {
        console.log("[socket] Disconnected");
        setLiveStatus(false);
      });

      socket.on("connect_error", (err) => {
        console.error("[socket] Connection error:", err.message);
        setLiveStatus(false);
      });

      function setLiveStatus(online) {
        const dot = document.querySelector(".live-dot");
        const text = document.querySelector(".live-dot + span");
        if (!dot) return;
        dot.style.background = online ? "#10b981" : "#ef4444";
        if (text) text.textContent = online ? "Live" : "Offline";
      }

      // ═══════════════════════════════════════════════════
      //  INIT – fetch existing orders, then render
      // ═══════════════════════════════════════════════════
      async function loadOrders() {
        try {
          const res = await fetch("/api/orders");
          if (!res.ok) return; // not authenticated yet
          const data = await res.json();
          // Populate local state (server returns oldest-first)
          orders = data.slice().reverse();
          renderGrids();
        } catch (err) {
          console.error("Failed to load orders:", err);
        }
      }

      loadOrders();
    </script>
  </body>
</html>
