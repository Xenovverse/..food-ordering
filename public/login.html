<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxe — Cashier Login</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { jakarta: ['"Plus Jakarta Sans"', "sans-serif"] },
            colors: { brand: "#10b981" },
          },
        },
      };
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #09090b;
      }

      /* Noise grain overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        opacity: 0.4;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.07);
      }

      .input-field {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #fff;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .input-field:focus {
        outline: none;
        border-color: rgba(16, 185, 129, 0.5);
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.08);
      }
      .input-field::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      .btn-primary {
        background: #10b981;
        color: #fff;
        font-weight: 600;
        transition:
          background 0.2s,
          transform 0.1s,
          box-shadow 0.2s;
      }
      .btn-primary:hover {
        background: #059669;
        box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
      }
      .btn-primary:active {
        transform: scale(0.98);
      }
      .btn-primary:disabled {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.3);
        cursor: not-allowed;
        box-shadow: none;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .fade-up-1 {
        animation-delay: 0.1s;
      }
      .fade-up-2 {
        animation-delay: 0.2s;
      }
      .fade-up-3 {
        animation-delay: 0.3s;
      }
      .fade-up-4 {
        animation-delay: 0.4s;
      }

      .shake {
        animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }
      @keyframes shake {
        10%,
        90% {
          transform: translateX(-2px);
        }
        20%,
        80% {
          transform: translateX(4px);
        }
        30%,
        50%,
        70% {
          transform: translateX(-6px);
        }
        40%,
        60% {
          transform: translateX(6px);
        }
      }

      /* Ambient orb */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        animation: orbPulse 6s ease-in-out infinite;
      }
      @keyframes orbPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.15;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.25;
        }
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden"
  >
    <!-- Ambient light -->
    <div
      class="orb w-96 h-96 bg-emerald-500 top-1/4 -left-48"
      style="animation-delay: 0s"
    ></div>
    <div
      class="orb w-80 h-80 bg-emerald-700 bottom-1/4 -right-40"
      style="animation-delay: 3s"
    ></div>

    <div class="relative z-10 w-full max-w-sm">
      <!-- Logo -->
      <div class="text-center mb-10 fade-up fade-up-1">
        <div
          class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-emerald-500/10 ring-1 ring-emerald-500/30 mb-4"
        >
          <span class="text-emerald-400 text-2xl">◆</span>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-tight">
          Luxe Ordering
        </h1>
        <p class="text-zinc-500 text-sm mt-1">Cashier Terminal Access</p>
      </div>

      <!-- Card -->
      <div class="glass-card rounded-3xl p-8 fade-up fade-up-2" id="login-card">
        <h2 class="text-lg font-semibold text-white mb-1">Welcome back</h2>
        <p class="text-zinc-500 text-sm mb-7">
          Sign in to access the dashboard.
        </p>

        <!-- Error message -->
        <div
          id="error-msg"
          class="hidden mb-5 px-4 py-3 rounded-xl bg-red-500/10 ring-1 ring-red-500/30 text-red-400 text-sm flex items-center gap-2"
        >
          <svg
            class="w-4 h-4 flex-shrink-0"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
              clip-rule="evenodd"
            />
          </svg>
          <span id="error-text">Invalid credentials.</span>
        </div>

        <!-- Form -->
        <div class="space-y-4 fade-up fade-up-3">
          <div>
            <label
              class="text-xs text-zinc-500 font-medium uppercase tracking-wider mb-2 block"
              >Username</label
            >
            <input
              type="text"
              id="username"
              autocomplete="username"
              placeholder="Admin"
              class="input-field w-full px-4 py-3.5 rounded-xl text-sm"
            />
          </div>
          <div>
            <label
              class="text-xs text-zinc-500 font-medium uppercase tracking-wider mb-2 block"
              >Password</label
            >
            <div class="relative">
              <input
                type="password"
                id="password"
                autocomplete="current-password"
                placeholder="••••••••"
                class="input-field w-full px-4 py-3.5 rounded-xl text-sm pr-11"
              />
              <button
                type="button"
                id="toggle-pw"
                class="absolute right-3.5 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 transition-colors"
              >
                <svg
                  id="eye-icon"
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <button
          id="login-btn"
          class="btn-primary w-full mt-6 py-3.5 rounded-xl text-sm fade-up fade-up-4"
        >
          Sign In
        </button>

        <p class="text-center text-zinc-600 text-xs mt-5">Hint: Admin / 1234</p>
      </div>
    </div>

    <script>
      const usernameEl = document.getElementById("username");
      const passwordEl = document.getElementById("password");
      const loginBtn = document.getElementById("login-btn");
      const errorMsg = document.getElementById("error-msg");
      const errorText = document.getElementById("error-text");
      const loginCard = document.getElementById("login-card");

      // Toggle password visibility
      document.getElementById("toggle-pw").addEventListener("click", () => {
        const isPw = passwordEl.type === "password";
        passwordEl.type = isPw ? "text" : "password";
      });

      // Enter key support
      [usernameEl, passwordEl].forEach((el) => {
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter") doLogin();
        });
      });

      loginBtn.addEventListener("click", doLogin);

      async function doLogin() {
        const username = usernameEl.value.trim();
        const password = passwordEl.value.trim();
        if (!username || !password) return;

        loginBtn.disabled = true;
        loginBtn.textContent = "Signing in…";
        errorMsg.classList.add("hidden");

        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (data.success) {
            loginBtn.textContent = "✓ Success";
            loginBtn.style.background = "#059669";
            setTimeout(() => {
              window.location.href = "/cashier.html";
            }, 400);
          } else {
            showError("Invalid username or password.");
          }
        } catch {
          showError("Connection error. Please try again.");
        }
      }

      function showError(msg) {
        errorText.textContent = msg;
        errorMsg.classList.remove("hidden");
        loginCard.classList.add("shake");
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
        loginCard.addEventListener(
          "animationend",
          () => loginCard.classList.remove("shake"),
          { once: true },
        );
      }
    </script>
  </body>
</html>
